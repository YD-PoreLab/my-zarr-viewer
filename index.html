<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zarr Viewer</title>
  <script type="module">
    import { Viewer } from "https://cdn.skypack.dev/vizarr";

    window.onload = () => {
      const viewer = new Viewer({
        container: document.getElementById("viewer"),
      });

      viewer.addImage({
        source: "https://57b46103f7d6baa69764db4038f7a904.r2.cloudflarestorage.com/zarr-scans",
      });
    };
  </script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }
    #viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="viewer"></div>
</body>
</html>
