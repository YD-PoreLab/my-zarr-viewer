<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tile Scan Viewer</title>
  <script type="module">
    import { Viewer } from "https://cdn.skypack.dev/vizarr";

    window.onload = () => {
      const viewer = new Viewer({
        container: document.getElementById("viewer"),
      });

      viewer.addImage({
        source: "https://pub-50092e82bd504c049bde48c59d5a84db.r2.dev/stitched_full_scan_rowcol_correction.ome.zarr",
      });
    };
  </script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="viewer"></div>
</body>
</html>
